<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grdx scxry - Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000; 
            overflow: hidden;
        }

        #bg-gif {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; 
            z-index: 1; 
            filter: brightness(0.4); 
        }

        .wrapper {
            position: relative;
            z-index: 2; 
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: 100%;
            max-width: 380px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 {
            color: white;
            font-size: 26px;
            margin: 10px 0;
            font-weight: 700;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.07);
            padding: 7px 15px;
            border-radius: 20px;
            font-size: 13px;
            color: #eee;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
        }

        .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
        transition: all 0.3s ease;
        }

        .online { background: #43b581; box-shadow: 0 0 8px #43b581; }
        .idle { background: rgb(184, 156, 77); box-shadow: 0 0 8px rgb(184, 156, 77); }
        .dnd { background: #f04747; box-shadow: 0 0 8px #f04747; }
        .offline { background: #747f8d; box-shadow: 0 0 8px #747f8d; }

        .spotify {
            color: #1DB954;
            font-size: 14px;
            font-weight: 500;
            margin-top: 10px;
            min-height: 20px;
        }

        .links {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .links a {
            color: rgba(249, 251, 208, 0.5);
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .links a:hover {
            color: white;
        }
    </style>
</head>
<body>

    <img id="bg-gif" src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHNjeXp0OW0xMnZyNGwwcHd3NW5yM2FwMDhuZ3V4YmN6ejIzeTE3bSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/zMv36BprGxUAqoWc72/giphy.gif" alt="bg">

    <div class="wrapper">
        <div class="card">
            <img id="pfp" class="avatar" src="https://via.placeholder.com/110" alt="avatar">
            
            <h1 id="username">grdx scxry</h1>
            
            <div class="status-badge">
                <div id="status-dot" class="dot offline"></div>
                <span id="status-text">Loading status...</span>
            </div>
<div id="spotify-info" style="min-height: 150px; margin-top: 20px; width: 100%; max-width: 400px;"></div>

<style>
    .card {
        height: 380px; 
        transition: height 0.4s ease-in-out; 
        overflow: hidden; 
    }
    #spotify-info {
        margin-top: 10px;
        width: 100%;
    }
</style>

<script>
const DISCORD_ID = '992332343115268146';

async function updateStatus() {
    try {
        const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
        const json = await response.json();
        const user = json.data;
        const card = document.querySelector('.card');
        const pfp = document.getElementById('pfp');
        const username = document.getElementById('username');
        if (pfp && user.discord_user.avatar) pfp.src = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${user.discord_user.avatar}.png?size=256`;
        if (username) username.innerText = user.discord_user.global_name || user.discord_user.username;

        const statusText = document.getElementById('status-text');
        if (statusText) statusText.innerText = user.discord_status.toUpperCase();

        const spotify = document.getElementById('spotify-info');

        if (user.listening_to_spotify && user.spotify) {
            if (card) card.style.height = '430px'; 
            
            spotify.innerHTML = `
                <div style="padding: 0 10px; margin-top: 10px;">
                    <iframe 
                        style="border-radius:12px" 
                        src="https://open.spotify.com/embed/track/${user.spotify.track_id}?theme=0" 
                        width="100%" 
                        height="80" 
                        frameBorder="0" 
                        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                        loading="lazy">
                    </iframe>
                </div>
            `;
        } else {
            if (card) card.style.height = '300px'; 
            spotify.innerHTML = ""; 
        }

    } catch (err) {
        console.error("Ошибка:", err);
    }
}

updateStatus();
setInterval(updateStatus, 10000);
</script>
</body>
</html>
